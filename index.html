<!DOCTYPE html>
<html lang="ru">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Бросок кубиков</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

<div class="page">

    <h1>Бросок кубиков</h1>

    <div class="dice-row">

        <!-- d8 -->

        <div class="dice-card">

            <div class="dice-name">d8</div>

            <div class="die" id="die8">

                <svg class="dice-svg" viewBox="0 0 200 200">

                    <polygon
                        class="face face8"
                        points="
                        100,10
                        175,55
                        175,145
                        100,190
                        25,145
                        25,55"/>

                    <polygon
                        class="line"
                        points="
                        100,28
                        158,63
                        158,137
                        100,172
                        42,137
                        42,63"/>

                </svg>

                <div class="value" id="value8">1</div>

            </div>

        </div>

        <!-- d10 -->

        <div class="dice-card">

            <div class="dice-name">d10</div>

            <div class="die" id="die10">

                <svg class="dice-svg" viewBox="0 0 200 200">

                    <polygon
                        class="face face10"
                        points="
                        100,8
                        155,25
                        190,100
                        155,175
                        100,192
                        45,175
                        10,100
                        45,25"/>

                    <polygon
                        class="line"
                        points="
                        100,28
                        145,42
                        168,100
                        145,158
                        100,172
                        55,158
                        32,100
                        55,42"/>

                </svg>

                <div class="value" id="value10">1</div>

            </div>

        </div>

        <!-- d12 -->

        <div class="dice-card">

            <div class="dice-name">d12</div>

            <div class="die" id="die12">

                <svg class="dice-svg" viewBox="0 0 200 200">

                    <polygon
                        class="face face12"
                        points="
                        60,10
                        140,10
                        185,50
                        190,120
                        160,180
                        100,195
                        40,180
                        10,120
                        15,50"/>

                    <polygon
                        class="line"
                        points="
                        65,28
                        135,28
                        167,58
                        171,118
                        148,164
                        100,176
                        52,164
                        29,118
                        33,58"/>

                </svg>

                <div class="value" id="value12">1</div>

            </div>

        </div>

    </div>

    <button id="rollButton">
        🎲 СТАРТ
    </button>

</div>

<script src="script.js"></script>

</body>
</html>

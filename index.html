<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Бросок кубиков</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1 class="title">Бросок кубиков</h1>

    <div class="dice-container">
      <!-- d8 -->
      <div class="die die-d8">
        <span class="label">d8</span>
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <polygon class="shape" points="" fill="#a855f7" stroke="#0f172a" stroke-width="6" stroke-linejoin="round"/>
          <polygon class="shape-inner" points="" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
        </svg>
        <span class="value">2</span>
      </div>

      <!-- d10 -->
      <div class="die die-d10">
        <span class="label">d10</span>
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <polygon class="shape" points="" fill="#3b82f6" stroke="#0f172a" stroke-width="6" stroke-linejoin="round"/>
          <polygon class="shape-inner" points="" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
        </svg>
        <span class="value">5</span>
      </div>

      <!-- d12 -->
      <div class="die die-d12">
        <span class="label">d12</span>
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <polygon class="shape" points="" fill="#22c55e" stroke="#0f172a" stroke-width="6" stroke-linejoin="round"/>
          <polygon class="shape-inner" points="" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
        </svg>
        <span class="value">6</span>
      </div>
    </div>

    <button class="start-btn" type="button">🎲 СТАРТ</button>
  </main>

  <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бросок кубиков</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Бросок кубиков</h1>

    <div class="dice-container">

        <!-- d8 -->
        <div class="dice-block">

            <div class="dice-title">d8</div>

            <div class="die" id="die8">

                <svg class="dice-svg d8" viewBox="0 0 200 200">

                    <polygon
                        class="outer"
                        points="
                        100,10
                        180,60
                        180,140
                        100,190
                        20,140
                        20,60"/>

                    <polygon
                        class="inner"
                        points="
                        100,25
                        165,65
                        165,135
                        100,175
                        35,135
                        35,65"/>

                </svg>

                <div class="dice-number" id="value8">1</div>

            </div>

        </div>

        <!-- d10 -->
        <div class="dice-block">

            <div class="dice-title">d10</div>

            <div class="die" id="die10">

                <svg class="dice-svg d10" viewBox="0 0 200 220">

                    <polygon
                        class="outer"
                        points="
                        100,10
                        165,50
                        185,110
                        155,180
                        100,210
                        45,180
                        15,110
                        35,50"/>

                    <polygon
                        class="inner"
                        points="
                        100,28
                        150,60
                        168,110
                        145,165
                        100,190
                        55,165
                        32,110
                        50,60"/>

                </svg>

                <div class="dice-number" id="value10">1</div>

            </div>

        </div>

        <!-- d12 -->
        <div class="dice-block">

            <div class="dice-title">d12</div>

            <div class="die" id="die12">

                <svg class="dice-svg d12" viewBox="0 0 220 220">

                    <polygon
                        class="outer"
                        points="
                        70,10
                        150,10
                        200,55
                        210,130
                        170,195
                        110,210
                        50,195
                        10,130
                        20,55"/>

                    <polygon
                        class="inner"
                        points="
                        75,28
                        145,28
                        183,62
                        191,126
                        160,178
                        110,190
                        60,178
                        29,126
                        37,62"/>

                </svg>

                <div class="dice-number" id="value12">1</div>

            </div>

        </div>

    </div>

    <button id="rollButton">
        🎲 СТАРТ
    </button>

</div>

<script src="script.js"></script>

</body>
</html>

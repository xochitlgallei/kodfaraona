<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кубики d8, d10, d12</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1 class="title">Бросок кубиков</h1>

    <div class="dice-container">
      <!-- d8: октаэдр (ромб с диагоналями) -->
      <div class="die die-d8" data-sides="8">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <polygon points="50,10 90,50 50,50" fill="#60a5fa" stroke="#1e3a8a" stroke-width="1.5" stroke-linejoin="round"/>
          <polygon points="90,50 50,90 50,50" fill="#3b82f6" stroke="#1e3a8a" stroke-width="1.5" stroke-linejoin="round"/>
          <polygon points="50,90 10,50 50,50" fill="#2563eb" stroke="#1e3a8a" stroke-width="1.5" stroke-linejoin="round"/>
          <polygon points="10,50 50,10 50,50" fill="#93c5fd" stroke="#1e3a8a" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <span class="value">8</span>
        <span class="label">d8</span>
      </div>

      <!-- d10: трапецоэдр (острый верх/низ + зигзаг) -->
      <div class="die die-d10" data-sides="10">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <polygon points="50,5 15,40 85,40" fill="#68d391" stroke="#14532d" stroke-width="1.5" stroke-linejoin="round"/>
          <polygon points="15,40 32.5,60 50,40" fill="#48bb78" stroke="#14532d" stroke-width="1.5" stroke-linejoin="round"/>
          <polygon points="50,40 32.5,60 67.5,60" fill="#38a169" stroke="#14532d" stroke-width="1.5" stroke-linejoin="round"/>
          <polygon points="50,40 67.5,60 85,40" fill="#2f855a" stroke="#14532d" stroke-width="1.5" stroke-linejoin="round"/>
          <polygon points="15,60 85,60 50,95" fill="#22543d" stroke="#14532d" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <span class="value">10</span>
        <span class="label">d10</span>
      </div>

      <!-- d12: додекаэдр (шестиугольник с пятиугольником внутри) -->
      <div class="die die-d12" data-sides="12">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <polygon points="50,5 89,27.5 89,72.5 50,95 11,72.5 11,27.5" fill="#c4b5fd" stroke="#4c1d95" stroke-width="1.5" stroke-linejoin="round"/>
          <polygon points="50,5 89,27.5 69,43.8 50,30" fill="#a78bfa" stroke="#4c1d95" stroke-width="1.5" stroke-linejoin="round"/>
          <polygon points="89,27.5 89,72.5 61.8,66.2 69,43.8" fill="#8b5cf6" stroke="#4c1d95" stroke-width="1.5" stroke-linejoin="round"/>
          <polygon points="89,72.5 50,95 38.2,66.2 61.8,66.2" fill="#7c3aed" stroke="#4c1d95" stroke-width="1.5" stroke-linejoin="round"/>
          <polygon points="50,95 11,72.5 31,43.8 38.2,66.2" fill="#6d28d9" stroke="#4c1d95" stroke-width="1.5" stroke-linejoin="round"/>
          <polygon points="11,72.5 11,27.5 50,5 31,43.8" fill="#5b21b6" stroke="#4c1d95" stroke-width="1.5" stroke-linejoin="round"/>
          <polygon points="50,30 69,43.8 61.8,66.2 38.2,66.2 31,43.8" fill="#ede9fe" stroke="#4c1d95" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <span class="value">12</span>
        <span class="label">d12</span>
      </div>
    </div>

    <button class="start-btn" type="button">🎲 СТАРТ</button>
  </main>

  <script src="script.js"></script>
</body>
</html>

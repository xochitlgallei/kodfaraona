<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кубики d8, d10, d12</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1 class="title">Бросок кубиков</h1>

    <div class="dice-container">
      <!-- d8: октаэдр -->
      <div class="die die-d8" data-sides="8">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="d8-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
            </linearGradient>
            <linearGradient id="d8-grad-2" x1="100%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
            </linearGradient>
          </defs>
          <!-- Верхняя половина -->
          <polygon points="50,15 80,50 50,50" fill="url(#d8-grad-1)" stroke="#1e40af" stroke-width="1.5" stroke-linejoin="round"/>
          <polygon points="50,15 50,50 20,50" fill="url(#d8-grad-2)" stroke="#1e40af" stroke-width="1.5" stroke-linejoin="round"/>
          <!-- Нижняя половина -->
          <polygon points="50,85 80,50 50,50" fill="#2563eb" stroke="#1e40af" stroke-width="1.5" stroke-linejoin="round"/>
          <polygon points="50,85 50,50 20,50" fill="#3b82f6" stroke="#1e40af" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <span class="value">8</span>
      </div>

      <!-- d10: трапецоэдр -->
      <div class="die die-d10" data-sides="10">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="d10-grad-1" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
            </linearGradient>
            <linearGradient id="d10-grad-2" x1="100%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" style="stop-color:#6ee7b7;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
            </linearGradient>
          </defs>
          <!-- Верхний левый -->
          <polygon points="50,10 30,45 50,45" fill="url(#d10-grad-1)" stroke="#047857" stroke-width="1.5" stroke-linejoin="round"/>
          <!-- Верхний правый -->
          <polygon points="50,10 50,45 70,45" fill="url(#d10-grad-2)" stroke="#047857" stroke-width="1.5" stroke-linejoin="round"/>
          <!-- Средний левый -->
          <polygon points="30,45 50,45 35,70" fill="#10b981" stroke="#047857" stroke-width="1.5" stroke-linejoin="round"/>
          <!-- Средний правый -->
          <polygon points="50,45 70,45 65,70" fill="#059669" stroke="#047857" stroke-width="1.5" stroke-linejoin="round"/>
          <!-- Нижний -->
          <polygon points="35,70 65,70 50,90" fill="#047857" stroke="#047857" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <span class="value">10</span>
      </div>

      <!-- d12: додекаэдр (пятиугольник) -->
      <div class="die die-d12" data-sides="12">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <linearGradient id="d12-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
            </linearGradient>
            <linearGradient id="d12-grad-2" x1="100%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:1" />
              <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
            </linearGradient>
          </defs>
          <!-- Центральная грань (пятиугольник) -->
          <polygon points="50,25 72,38 65,65 35,65 28,38" fill="url(#d12-grad-1)" stroke="#6d28d9" stroke-width="1.5" stroke-linejoin="round"/>
          <!-- Верхняя грань -->
          <polygon points="50,25 72,38 50,10 28,38" fill="url(#d12-grad-2)" stroke="#6d28d9" stroke-width="1.5" stroke-linejoin="round"/>
          <!-- Правая верхняя -->
          <polygon points="72,38 78,62 65,65" fill="#8b5cf6" stroke="#6d28d9" stroke-width="1.5" stroke-linejoin="round"/>
          <!-- Правая нижняя -->
          <polygon points="65,65 78,62 58,85 50,82" fill="#7c3aed" stroke="#6d28d9" stroke-width="1.5" stroke-linejoin="round"/>
          <!-- Левая нижняя -->
          <polygon points="35,65 50,82 58,85 22,62" fill="#6d28d9" stroke="#6d28d9" stroke-width="1.5" stroke-linejoin="round"/>
          <!-- Левая верхняя -->
          <polygon points="28,38 22,62 35,65" fill="#9333ea" stroke="#6d28d9" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
        <span class="value">12</span>
      </div>
    </div>

    <button class="start-btn" type="button">🎲 Новый раунд</button>
  </main>

  <script src="script.js"></script>
</body>
</html>

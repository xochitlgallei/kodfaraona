<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Бросок кубиков</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1 class="title">Бросок кубиков</h1>

    <div class="dice-container">
      <!-- d8: восьмиугольник -->
      <div class="die die-d8">
        <span class="label">d8</span>
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <polygon points="100,10 135,25 160,55 170,95 160,135 135,165 100,180 65,165 40,135 30,95 40,55 65,25" fill="#a855f7" stroke="#0f172a" stroke-width="6" stroke-linejoin="round"/>
          <polygon points="100,22 128,34 148,58 156,90 148,122 128,146 100,158 72,146 52,122 44,90 52,58 72,34" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
        </svg>
        <span class="value">2</span>
      </div>

      <!-- d10: десятиугольник -->
      <div class="die die-d10">
        <span class="label">d10</span>
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <polygon points="100,10 131,21 153,45 164,75 164,107 153,137 131,161 100,172 69,161 47,137 36,107 36,75 47,45 69,21" fill="#3b82f6" stroke="#0f172a" stroke-width="6" stroke-linejoin="round"/>
          <polygon points="100,22 124,31 141,50 149,75 149,101 141,126 124,145 100,154 76,145 59,126 51,101 51,75 59,50 76,31" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
        </svg>
        <span class="value">5</span>
      </div>

      <!-- d12: двенадцатиугольник -->
      <div class="die die-d12">
        <span class="label">d12</span>
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <polygon points="100,10 127,19 149,38 163,63 168,91 163,119 149,144 127,163 100,172 73,163 51,144 37,119 32,91 37,63 51,38 73,19" fill="#22c55e" stroke="#0f172a" stroke-width="6" stroke-linejoin="round"/>
          <polygon points="100,22 121,29 138,44 149,64 153,86 149,108 138,128 121,143 100,150 79,143 62,128 51,108 47,86 51,64 62,44 79,29" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
        </svg>
        <span class="value">6</span>
      </div>
    </div>

    <button class="start-btn" type="button">🎲 СТАРТ</button>
  </main>

  <script src="script.js"></script>
</body>
</html>
